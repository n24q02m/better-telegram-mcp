name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GH_PAT }}

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/upload-to-pypi@v10
        with:
          pypi_token: ${{ secrets.PYPI_TOKEN }}

      - name: Build and push Docker
        if: steps.release.outputs.released == 'true'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u n24q02m --password-stdin
          docker build -t n24q02m/better-telegram-mcp:latest -t "n24q02m/better-telegram-mcp:$RELEASE_VERSION" .
          docker push n24q02m/better-telegram-mcp --all-tags

      - name: Publish to MCP Registry
        if: steps.release.outputs.released == 'true'
        uses: anthropics/mcp-publisher@v1
